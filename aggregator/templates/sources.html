<!doctype html>
<html>
<head>
  <meta charset=utf-8>
  <title>RSS Sources</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #222; }
    h1 { margin-bottom: 4px; }
    .hint { color: #666; font-size: 14px; margin-bottom: 20px; }
    textarea { width: 100%; height: 500px; font-family: ui-monospace, Menlo, monospace; font-size: 13px; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    button { margin-top: 12px; padding: 10px 20px; background: #4a5c3f; color: #fff; border: 0; border-radius: 6px; font-weight: 600; cursor: pointer; }
    button:hover { background: #3a4c2f; }
    a { color: #4a5c3f; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .nav { margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class=nav><a href=/>← Home</a> | <a href={{ url_for('admin.tools_page') }}>Admin Tools</a> | <a href={{ url_for('admin.fetch_page') }}>Fetch Articles</a></div>
  <h1>RSS Sources</h1>
  <p class=hint>One URL per line. Lines starting with <code>#</code> are ignored. Blank list falls back to the {{ default_count }} hardcoded defaults. Changes apply to the next fetch cycle.</p>
  <form method=POST><input type=hidden name=csrf_token value="{{ csrf_token() }}">
    <textarea name=feeds spellcheck=false>{{ feeds_text }}</textarea>
    <br><button type=submit>Save</button>
  </form>
</body>
</html>
